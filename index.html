<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFG World Cup Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#cc0000;--red-dark:#990000;--gold:#ffd700;--blue:#1a3a6b;
  --bg:#0a0c14;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --text:#e8e8e8;--text-dim:#8a8fa0;--glass-blur:16px;--radius:12px;
  --transition:cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;line-height:1.5;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ── ANIMATED BACKGROUND BLOBS ── */
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.blob-red{width:600px;height:600px;background:rgba(204,0,0,0.15);top:-10%;left:-5%;animation:drift1 18s ease-in-out infinite alternate}
.blob-gold{width:500px;height:500px;background:rgba(255,215,0,0.12);top:40%;right:-8%;animation:drift2 22s ease-in-out infinite alternate}
.blob-blue{width:550px;height:550px;background:rgba(26,58,107,0.18);bottom:-10%;left:30%;animation:drift3 20s ease-in-out infinite alternate}
@keyframes drift1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(80px,60px) scale(1.15)}}
@keyframes drift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-70px,-50px) scale(1.1)}}
@keyframes drift3{0%{transform:translate(0,0) scale(1)}100%{transform:translate(50px,-70px) scale(1.2)}}

/* ── STADIUM RADIAL ── */
.stadium-light{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.03) 0%,transparent 60%)}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,#14161e 0%,#0c0e16 100%);
  backdrop-filter:blur(20px);
  border-bottom:3px solid var(--red);
  box-shadow:0 4px 30px rgba(204,0,0,0.2);
  padding:0 24px;
}
.header-inner{
  max-width:1400px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  height:60px;gap:16px;flex-wrap:wrap;
}
.brand{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:1.35rem;
  text-transform:uppercase;letter-spacing:2px;
  background:linear-gradient(135deg,#fff 0%,#c0c0c0 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;
}
.header-nav{display:flex;align-items:center;gap:6px}
.tab-btn{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.85rem;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:8px 20px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.06);color:var(--text-dim);
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
  transition:all 0.3s var(--transition);position:relative;
}
.tab-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.tab-btn.active{background:var(--red);color:#fff;box-shadow:0 0 16px rgba(204,0,0,0.3)}
.header-actions{display:flex;align-items:center;gap:10px}
.mfg-link{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.8rem;
  text-transform:uppercase;letter-spacing:1px;
  padding:7px 18px;text-decoration:none;color:var(--gold);
  background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.2);
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  transition:all 0.3s var(--transition);
}
.mfg-link:hover{background:rgba(255,215,0,0.15);box-shadow:0 0 16px rgba(255,215,0,0.15)}
.gemini-toggle{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.8rem;
  text-transform:uppercase;letter-spacing:1px;
  padding:7px 18px;border:none;cursor:pointer;
  background:linear-gradient(135deg,rgba(66,133,244,0.15),rgba(219,68,55,0.15),rgba(244,180,0,0.15));
  color:#fff;border:1px solid rgba(255,255,255,0.1);
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  transition:all 0.3s var(--transition);
}
.gemini-toggle:hover{box-shadow:0 0 20px rgba(244,180,0,0.2)}

/* ── TICKER ── */
.ticker-bar{
  position:sticky;top:63px;z-index:99;
  background:linear-gradient(90deg,var(--red-dark),var(--red));
  backdrop-filter:blur(12px);
  border-bottom:2px solid var(--gold);
  overflow:hidden;display:flex;align-items:center;height:36px;
}
.ticker-label{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:0.75rem;
  text-transform:uppercase;letter-spacing:2px;color:#fff;
  background:rgba(0,0,0,0.4);padding:0 20px 0 14px;height:100%;
  display:flex;align-items:center;white-space:nowrap;
  clip-path:polygon(0 0,100% 0,calc(100% - 12px) 100%,0 100%);
  z-index:1;flex-shrink:0;
}
.ticker-track{
  display:flex;animation:marquee 60s linear infinite;white-space:nowrap;
}
.ticker-bar:hover .ticker-track{animation-play-state:paused}
.ticker-item{
  font-family:'Inter',sans-serif;font-weight:500;font-size:0.8rem;
  color:#fff;padding:0 40px;white-space:nowrap;opacity:0.95;
}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── MAIN CONTENT ── */
.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px}
.tab-panel{display:none;animation:fadeUp 0.4s var(--transition)}
.tab-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.section-title{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:1.3rem;
  text-transform:uppercase;letter-spacing:2px;
  border-left:4px solid var(--red);padding-left:14px;margin-bottom:20px;
}
.updated{font-size:0.75rem;color:var(--text-dim);margin-bottom:24px}

/* ── GLASS CARD ── */
.glass{
  background:var(--surface);backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--border);border-radius:var(--radius);
  transition:all 0.35s var(--transition);
}
.glass:hover{border-color:rgba(255,255,255,0.14)}

/* ── LIVE TAB ── */
.live-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.news-col,.social-col{display:flex;flex-direction:column;gap:16px}

/* News cards */
.news-card{padding:20px;position:relative;overflow:hidden}
.news-card:hover{box-shadow:0 0 24px rgba(204,0,0,0.15)}
.news-card .tag{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.65rem;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:4px 14px;display:inline-block;margin-bottom:10px;
  clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);
}
.tag-canada{background:rgba(255,0,0,0.2);color:#ff6b6b}
.tag-germany{background:rgba(255,215,0,0.15);color:var(--gold)}
.tag-general{background:rgba(255,255,255,0.08);color:var(--text-dim)}
.news-card h3{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:1.05rem;
  text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;line-height:1.3;
}
.news-card .meta{font-size:0.72rem;color:var(--text-dim);margin-bottom:8px}
.news-card .summary{font-size:0.85rem;color:rgba(255,255,255,0.7);line-height:1.55}
.news-card .read-more{
  display:inline-block;margin-top:10px;font-size:0.75rem;font-weight:600;
  color:var(--red);text-decoration:none;text-transform:uppercase;letter-spacing:1px;
  transition:color 0.2s;
}
.news-card .read-more:hover{color:#ff4444}

/* Social cards */
.social-card{padding:20px}
.social-card:hover{box-shadow:0 0 24px rgba(255,215,0,0.12)}
.social-card .topic{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:1rem;
  text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;
}
.social-card .volume{font-size:0.8rem;margin-bottom:8px}
.social-card .summary{font-size:0.82rem;color:rgba(255,255,255,0.65);margin-bottom:10px;line-height:1.5}
.social-card .quote{
  font-style:italic;font-size:0.8rem;color:rgba(255,255,255,0.5);
  border-left:2px solid var(--gold);padding-left:10px;margin-bottom:10px;
}
.social-card .platforms{display:flex;gap:6px;flex-wrap:wrap}
.platform-pill{
  font-size:0.65rem;font-weight:600;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,0.06);color:var(--text-dim);
}
.sentiment-badge{
  display:inline-block;font-family:'Oswald',sans-serif;font-weight:600;
  font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;
  padding:3px 12px;margin-bottom:8px;
  clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);
}
.sentiment-positive{background:rgba(0,200,83,0.15);color:#00c853;box-shadow:0 0 10px rgba(0,200,83,0.1)}
.sentiment-mixed{background:rgba(255,193,7,0.15);color:#ffc107;box-shadow:0 0 10px rgba(255,193,7,0.1)}

/* ── FIXTURES TAB ── */
.fixtures-controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.view-btn{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.7rem;
  text-transform:uppercase;letter-spacing:1.5px;padding:6px 16px;
  background:transparent;color:var(--text-dim);border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  transition:all 0.2s;
}
.view-btn:hover{color:#fff;border-color:rgba(255,255,255,0.2)}
.view-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.group-filter{
  font-family:'Inter',sans-serif;font-size:12px;padding:6px 10px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  color:var(--text);border-radius:6px;outline:none;margin-left:auto;
}
.group-filter option{background:#1a1a2e;color:#e8e8e8}

.date-group{margin-bottom:28px}
.date-header{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:0.95rem;
  text-transform:uppercase;letter-spacing:2px;color:var(--gold);
  padding:8px 0;margin-bottom:10px;
  border-bottom:1px solid rgba(255,215,0,0.15);
  display:flex;align-items:center;gap:8px;
}
.date-header .match-count{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  color:var(--text-dim);letter-spacing:0;text-transform:none;
}
.stage-group{margin-bottom:28px}
.stage-group h3{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:0.95rem;
  text-transform:uppercase;letter-spacing:2px;color:var(--gold);
  margin-bottom:10px;padding:8px 0;
  border-bottom:1px solid rgba(255,215,0,0.15);
}
.matches-list{display:flex;flex-direction:column;gap:6px}

/* ESPN-style match row */
.match-row{
  display:grid;grid-template-columns:1fr auto 1fr auto;
  align-items:center;padding:0;overflow:hidden;min-height:56px;
  transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
}
.match-row:hover{box-shadow:0 0 20px rgba(204,0,0,0.1);border-color:rgba(255,255,255,0.15)}
.team{display:flex;align-items:center;gap:8px;padding:10px 16px}
.team-home{justify-content:flex-end;text-align:right}
.team-away{justify-content:flex-start}
.team-flag{font-size:1.3rem}
.team-name{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.85rem;
  text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;
}
.team-code{font-size:0.65rem;color:var(--text-dim);letter-spacing:1px}
.match-center{
  text-align:center;padding:8px 12px;min-width:80px;
  border-left:1px solid rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.05);
}
.match-center .kickoff{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:0.85rem;color:#fff;
}
.match-center .score{
  font-family:'Oswald',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:2px;
}
.match-center .group-tag{
  font-size:0.6rem;color:var(--text-dim);letter-spacing:1px;
  text-transform:uppercase;font-family:'Oswald',sans-serif;
}
.match-detail{
  background:rgba(204,0,0,0.15);
  padding:8px 16px;display:flex;flex-direction:column;
  justify-content:center;gap:1px;min-width:180px;
  border-left:2px solid var(--red);
}
.match-detail .venue{font-size:0.7rem;color:var(--text-dim)}
.match-detail .date{font-family:'Oswald',sans-serif;font-size:0.7rem;color:rgba(255,255,255,0.6);letter-spacing:0.5px}
.match-detail .status-badge{
  display:inline-block;font-size:0.55rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:2px 8px;border-radius:20px;width:fit-content;margin-top:2px;
}
.status-upcoming{background:rgba(33,150,243,0.2);color:#64b5f6;box-shadow:0 0 6px rgba(33,150,243,0.1)}
.status-live{background:rgba(0,200,83,0.2);color:#69f0ae;box-shadow:0 0 8px rgba(0,200,83,0.15)}

/* ── CREATIVE TAB ── */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-pill{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.75rem;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:7px 20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);
  cursor:pointer;
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  transition:all 0.3s var(--transition);
}
.filter-pill:hover{border-color:rgba(255,255,255,0.2);color:#fff}
.filter-pill.active{background:var(--red);color:#fff;border-color:var(--red)}
.assets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.asset-card{overflow:hidden;display:flex;flex-direction:column}
.asset-card:hover{box-shadow:0 0 24px rgba(204,0,0,0.12)}
.asset-thumb{
  width:100%;height:180px;object-fit:cover;background:rgba(255,255,255,0.02);
  display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;color:var(--text-dim);position:relative;overflow:hidden;
}
.asset-thumb img{width:100%;height:100%;object-fit:cover}
.asset-thumb .fallback{
  display:flex;align-items:center;justify-content:center;width:100%;height:100%;
  background:linear-gradient(135deg,rgba(204,0,0,0.08),rgba(255,215,0,0.05));
  font-family:'Oswald',sans-serif;font-size:0.85rem;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:2px;
}
.asset-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:8px}
.asset-body h4{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.9rem;
  text-transform:uppercase;letter-spacing:0.5px;line-height:1.3;
}
.asset-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.asset-format{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.6rem;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:3px 12px;background:rgba(255,255,255,0.08);color:var(--text-dim);
  clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);
}
.asset-status-pill{
  font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  padding:3px 10px;border-radius:20px;
}
.astatus-live{background:rgba(0,200,83,0.2);color:#69f0ae;box-shadow:0 0 8px rgba(0,200,83,0.15)}
.astatus-scheduled{background:rgba(33,150,243,0.2);color:#64b5f6;box-shadow:0 0 8px rgba(33,150,243,0.15)}
.astatus-review{background:rgba(255,193,7,0.2);color:#ffc107}
.astatus-concept{background:rgba(255,255,255,0.08);color:var(--text-dim)}
.asset-date{font-size:0.72rem;color:var(--text-dim)}
.asset-link{
  display:inline-block;margin-top:auto;padding-top:8px;
  font-size:0.75rem;font-weight:600;color:var(--gold);
  text-decoration:none;text-transform:uppercase;letter-spacing:1px;
  transition:color 0.2s;
}
.asset-link:hover{color:#ffe44d}

/* ── GEMINI PANEL ── */
.gemini-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);opacity:0;pointer-events:none;
  transition:opacity 0.35s var(--transition);
}
.gemini-overlay.open{opacity:1;pointer-events:auto}
.gemini-panel{
  position:fixed;top:0;right:0;bottom:0;z-index:201;
  width:420px;max-width:90vw;
  background:rgba(14,16,24,0.92);backdrop-filter:blur(24px);
  border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform 0.4s var(--transition);
  display:flex;flex-direction:column;
}
.gemini-panel.open{transform:translateX(0)}
.gemini-header{
  padding:20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.gemini-brand{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:1.1rem;
  text-transform:uppercase;letter-spacing:2px;
  background:linear-gradient(135deg,#4285f4,#db4437,#f4b400,#0f9d58);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.gemini-close{
  background:none;border:none;color:var(--text-dim);font-size:1.2rem;
  cursor:pointer;padding:4px 8px;transition:color 0.2s;
}
.gemini-close:hover{color:#fff}
.gemini-messages{
  flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;
}
.gemini-msg{
  padding:12px 16px;border-radius:10px;font-size:0.85rem;line-height:1.55;
  max-width:90%;
}
.gemini-msg.assistant{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  align-self:flex-start;
}
.gemini-msg.user{
  background:rgba(66,133,244,0.12);border:1px solid rgba(66,133,244,0.2);
  align-self:flex-end;
}
.gemini-input-area{
  padding:16px;border-top:1px solid var(--border);display:flex;gap:8px;
}
.gemini-input{
  flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;color:var(--text);font-size:0.85rem;
  font-family:'Inter',sans-serif;outline:none;
  transition:border-color 0.2s;
}
.gemini-input:focus{border-color:rgba(255,255,255,0.2)}
.gemini-send{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:0.8rem;
  text-transform:uppercase;letter-spacing:1px;
  padding:10px 20px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#4285f4,#f4b400);color:#fff;
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  transition:all 0.3s var(--transition);
}
.gemini-send:hover{box-shadow:0 0 16px rgba(66,133,244,0.3)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .live-grid{grid-template-columns:1fr}
  .header-inner{height:auto;padding:10px 0;flex-wrap:wrap}
  .match-row{grid-template-columns:1fr auto 1fr;gap:0}
  .match-detail{display:none}
  .team{min-width:90px}
}
@media(max-width:600px){
  .header-nav{order:3;width:100%;justify-content:center}
  .brand{font-size:1.1rem}
  .tab-btn{padding:6px 14px;font-size:0.75rem}
  .assets-grid{grid-template-columns:1fr}
  .gemini-panel{width:100%;max-width:100%}
  .section-title{font-size:1.1rem}
  .match-teams{flex-direction:column;gap:4px}
  .team{justify-content:center !important;text-align:center !important;min-width:auto}
  .vs-divider{padding:2px 0}
}
</style>
</head>
<body>

<!-- BG -->

// ── RENDER ──
function init() {
  renderTicker();
  renderTimestamp();
  renderNews();
  renderSocial();
  renderMatches();
  renderAssets();
  setupTabs();
  setupGemini();
  setupKeyboard();
  handleHash();
}

function renderTicker() {
  const track = document.getElementById('tickerTrack');
  const items = DASHBOARD_DATA.ticker.map(t => `<span class="ticker-item">${t}</span>`).join('');
  track.innerHTML = items + items;
}

function renderTimestamp() {
  const d = new Date(DASHBOARD_DATA.lastUpdated);
  document.getElementById('lastUpdated').textContent = `Last updated: ${d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} at ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'})}`;
}

function renderNews() {
  const container = document.getElementById('newsCards');
  container.innerHTML = DASHBOARD_DATA.news.map(n => {
    const tagClass = n.tag === 'Canada' ? 'tag-canada' : n.tag === 'Germany' ? 'tag-germany' : 'tag-general';
    const tagLabel = n.tag || 'General';
    const time = new Date(n.timestamp);
    const timeStr = time.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' \u2022 ' + time.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return `<div class="news-card glass">
      <span class="tag ${tagClass}">${tagLabel}</span>
      <h3>${n.headline}</h3>
      <p class="meta">${n.source} \u2022 ${timeStr}</p>
      <p class="summary">${n.summary}</p>
      <a href="${n.url}" target="_blank" rel="noopener" class="read-more">Read More \u2192</a>
    </div>`;
  }).join('');
}

function renderSocial() {
  const container = document.getElementById('socialCards');
  container.innerHTML = DASHBOARD_DATA.social.map(s => {
    const sentClass = s.sentiment === 'positive' ? 'sentiment-positive' : 'sentiment-mixed';
    const quoteHtml = s.sampleQuote ? `<p class="quote">${s.sampleQuote}</p>` : '';
    return `<div class="social-card glass">
      <span class="sentiment-badge ${sentClass}">${s.sentiment}</span>
      <h3 class="topic">${s.topic}</h3>
      <p class="volume">${s.volume}</p>
      <p class="summary">${s.summary}</p>
      ${quoteHtml}
      <div class="platforms">${s.platforms.map(p => `<span class="platform-pill">${p}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

let fixtureView = 'date';
function setFixtureView(view) {
  fixtureView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  renderMatches();
}

function renderMatchRow(m) {
  const statusClass = m.status === 'live' ? 'status-live' : 'status-upcoming';
  const dateStr = new Date(m.date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const scoreOrTime = m.score
    ? `<div class="score">${m.score.home} – ${m.score.away}</div><div class="group-tag">FT</div>`
    : `<div class="kickoff">${m.kickoff}</div><div class="group-tag">${m.stage}</div>`;
  return `<div class="match-row glass">
    <div class="team team-home">
      <div><div class="team-name">${m.home.name}</div><div class="team-code">${m.home.code}</div></div>
      <span class="team-flag">${m.home.flag}</span>
    </div>
    <div class="match-center">${scoreOrTime}</div>
    <div class="team team-away">
      <span class="team-flag">${m.away.flag}</span>
      <div><div class="team-name">${m.away.name}</div><div class="team-code">${m.away.code}</div></div>
    </div>
    <div class="match-detail">
      <span class="venue">${m.venue}</span>
      <span class="date">${dateStr}</span>
      <span class="status-badge ${statusClass}">${m.status}</span>
    </div>
  </div>`;
}

function renderMatches() {
  const container = document.getElementById('matchList');
  const filterVal = document.getElementById('groupFilter').value;
  let matches = DASHBOARD_DATA.matches;
  if (filterVal !== 'all') {
    matches = matches.filter(m => m.stage === filterVal);
  }

  if (fixtureView === 'date') {
    // Group by date (ESPN-style)
    const byDate = {};
    matches.forEach(m => {
      if (!byDate[m.date]) byDate[m.date] = [];
      byDate[m.date].push(m);
    });
    container.innerHTML = Object.entries(byDate).map(([date, games]) => {
      const dateStr = new Date(date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
      return `<div class="date-group">
        <div class="date-header">${dateStr} <span class="match-count">${games.length} match${games.length > 1 ? 'es' : ''}</span></div>
        <div class="matches-list">${games.map(renderMatchRow).join('')}</div>
      </div>`;
    }).join('');
  } else {
    // Group by stage
    const byStage = {};
    matches.forEach(m => {
      if (!byStage[m.stage]) byStage[m.stage] = [];
      byStage[m.stage].push(m);
    });
    container.innerHTML = Object.entries(byStage).map(([stage, games]) => {
      return `<div class="stage-group">
        <h3>${stage} <span style="font-family:Inter,sans-serif;font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);letter-spacing:0;text-transform:none">${games.length} matches</span></h3>
        <div class="matches-list">${games.map(renderMatchRow).join('')}</div>
      </div>`;
    }).join('');
  }
}

function renderAssets(filter = 'All') {
  const grid = document.getElementById('assetsGrid');
  const filtered = filter === 'All' ? DASHBOARD_DATA.assets : DASHBOARD_DATA.assets.filter(a => a.market === filter);
  grid.innerHTML = filtered.map(a => {
    const statusMap = { 'Live': 'astatus-live', 'Scheduled': 'astatus-scheduled', 'In Review': 'astatus-review', 'Concept': 'astatus-concept' };
    const sc = statusMap[a.status] || 'astatus-concept';
    return `<div class="asset-card glass">
      <div class="asset-thumb">
        <img src="${driveThumbnail(a.driveFileId, 400)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="fallback" style="display:none;position:absolute;inset:0">${a.format}</div>
      </div>
      <div class="asset-body">
        <h4>${a.headline}</h4>
        <div class="asset-meta">
          <span class="asset-format">${a.format}</span>
          <span class="asset-status-pill ${sc}">${a.status}</span>
        </div>
        <span class="asset-date">Deploy: ${new Date(a.deployDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
        <a href="${a.driveUrl}" target="_blank" rel="noopener" class="asset-link">Open in Drive \u2192</a>
      </div>
    </div>`;
  }).join('');

  const bar = document.getElementById('filterBar');
  const markets = ['All', 'Canada', 'Germany', 'Global'];
  bar.innerHTML = markets.map(m => `<button class="filter-pill${m === filter ? ' active' : ''}" data-market="${m}">${m}</button>`).join('');
  bar.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => renderAssets(btn.dataset.market));
  });
}

function setupTabs() {
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  const panel = document.getElementById(`panel-${tab}`);
  if (btn) btn.classList.add('active');
  if (panel) { panel.classList.add('active'); panel.style.animation = 'none'; panel.offsetHeight; panel.style.animation = ''; }
  history.replaceState(null, '', `#${tab}`);
}

function handleHash() {
  const hash = location.hash.replace('#', '');
  if (['live', 'calendar', 'creative'].includes(hash)) switchTab(hash);
}
window.addEventListener('hashchange', handleHash);

function setupGemini() {
  const overlay = document.getElementById('geminiOverlay');
  const panel = document.getElementById('geminiPanel');
  const toggle = document.getElementById('geminiToggle');
  const close = document.getElementById('geminiClose');
  const input = document.getElementById('geminiInput');
  const send = document.getElementById('geminiSend');
  const messages = document.getElementById('geminiMessages');
  const chatHistory = [];

  function openGemini() { overlay.classList.add('open'); panel.classList.add('open'); input.focus(); }
  function closeGemini() { overlay.classList.remove('open'); panel.classList.remove('open'); }

  toggle.addEventListener('click', openGemini);
  close.addEventListener('click', closeGemini);
  overlay.addEventListener('click', closeGemini);

  function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    messages.innerHTML += `<div class="gemini-msg user">${escapeHtml(text)}</div>`;
    input.value = '';
    messages.scrollTop = messages.scrollHeight;

    // Show typing indicator
    const typingEl = document.createElement('div');
    typingEl.className = 'gemini-msg assistant';
    typingEl.style.opacity = '0.5';
    typingEl.textContent = 'Thinking...';
    messages.appendChild(typingEl);
    messages.scrollTop = messages.scrollHeight;

    chatHistory.push({ role: "user", parts: [{ text: text }] });

    try {
      const systemInstruction = `You are a strategic analyst embedded in the MFG World Cup Command dashboard — an internal war room for a global strategy team running premade and reactive Instagram content during the 2026 FIFA World Cup.

You have full access to the dashboard data below. Use it to answer questions about:
- Match schedule, fixtures, venues, dates, kickoff times (104 matches total, Groups A-L)
- Latest news headlines and sources
- Social media trends, sentiment, volume, and platform distribution
- Creative assets pipeline (status, market, format, deploy dates)
- Campaign strategy recommendations

Be concise, actionable, and strategic. Use data from the dashboard to back up your answers. When discussing matches, reference actual teams, dates, and venues. When discussing social trends, reference specific topics and their metrics.

DASHBOARD DATA:
${JSON.stringify(DASHBOARD_DATA, null, 2)}`;

      const payload = {
        system_instruction: { parts: [{ text: systemInstruction }] },
        contents: chatHistory,
        generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
      };

      const res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=AIzaSyDHNF5_acv1YF_sgiy3SMFK5xnqnIqQJGc',
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
      );

      const data = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'No response generated.';

      chatHistory.push({ role: "model", parts: [{ text: reply }] });

      typingEl.remove();
      messages.innerHTML += `<div class="gemini-msg assistant">${escapeHtml(reply)}</div>`;
    } catch (e) {
      typingEl.remove();
      messages.innerHTML += `<div class="gemini-msg assistant" style="color:#ff4444">Error: ${escapeHtml(e.message)}</div>`;
    }
    messages.scrollTop = messages.scrollHeight;
  }

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
}

function setupKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === '1') switchTab('live');
    else if (e.key === '2') switchTab('calendar');
    else if (e.key === '3') switchTab('creative');
    else if (e.key === 'g' || e.key === 'G') {
      document.getElementById('geminiOverlay').classList.add('open');
      document.getElementById('geminiPanel').classList.add('open');
      document.getElementById('geminiInput').focus();
    }
    else if (e.key === 'Escape') {
      document.getElementById('geminiOverlay').classList.remove('open');
      document.getElementById('geminiPanel').classList.remove('open');
    }
  });
}

init();
</script>
</body>
</html>
